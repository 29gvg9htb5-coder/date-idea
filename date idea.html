<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date Idea ♡</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}

.hk-wrap {
  min-height: 520px;
  background: #fff0f6;
  border-radius: 24px;
  padding: 2rem 1.5rem 2.5rem;
  position: relative;
  overflow: hidden;
  font-family: 'Nunito', sans-serif;
  border: 2px solid #f9b8d4;
}

.hearts-bg {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
}

.content { position: relative; z-index: 1; max-width: 440px; margin: 0 auto; }

.title-row {
  text-align: center; margin-bottom: 1.75rem;
}
.title-text {
  font-family: 'Pacifico', cursive;
  font-size: 26px;
  color: #d63384;
  line-height: 1.3;
}
.title-sub {
  font-size: 13px; color: #e07aaa; margin-top: 4px;
}

.progress-bar {
  height: 8px;
  background: #fdd4e8;
  border-radius: 99px;
  margin-bottom: 2rem;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #f472b6, #a855f7);
  border-radius: 99px;
  transition: width 0.5s cubic-bezier(.68,-0.55,.27,1.55);
  width: 0%;
}

.step { display: none; }
.step.active { display: block; }

.step-label {
  font-size: 12px; color: #e07aaa;
  margin-bottom: 0.5rem; font-weight: 600;
  letter-spacing: 0.05em; text-transform: uppercase;
}

.question {
  font-family: 'Pacifico', cursive;
  font-size: 22px; color: #c2185b;
  line-height: 1.45; margin-bottom: 1.75rem;
  text-align: center;
}

.btn-row { display: flex; gap: 14px; }

.btn {
  flex: 1; padding: 0.85rem 1rem;
  border-radius: 50px;
  border: 2px solid #f9b8d4;
  background: #fff;
  color: #d63384; font-size: 15px; font-weight: 700;
  cursor: pointer; font-family: 'Nunito', sans-serif;
  transition: transform 0.15s, background 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn:hover { transform: scale(1.04); background: #fff0f6; }
.btn:active { transform: scale(0.97); }

.btn-yes {
  background: #f472b6; border-color: #ec4899; color: #fff;
  box-shadow: 0 4px 14px rgba(244,114,182,0.35);
}
.btn-yes:hover { background: #ec4899; }

.btn-no {
  background: #fff; border-color: #f9b8d4; color: #d63384;
}

.input-group { margin-bottom: 1.1rem; }
.input-label {
  font-size: 13px; color: #e07aaa; margin-bottom: 0.35rem;
  display: block; font-weight: 700;
}
.text-input {
  width: 100%; padding: 0.65rem 1rem;
  border-radius: 50px;
  border: 2px solid #f9b8d4;
  background: #fff;
  color: #c2185b; font-size: 15px; font-weight: 600;
  font-family: 'Nunito', sans-serif; outline: none;
  transition: border 0.15s, box-shadow 0.15s;
}
.text-input::placeholder { color: #f0a8cc; font-weight: 400; }
.text-input:focus {
  border-color: #f472b6;
  box-shadow: 0 0 0 4px rgba(244,114,182,0.18);
}
.text-input.error { border-color: #ef4444; }

.btn-submit {
  width: 100%; padding: 0.85rem;
  background: linear-gradient(135deg, #f472b6, #a855f7);
  color: #fff; border: none; border-radius: 50px;
  font-size: 16px; cursor: pointer; font-weight: 700;
  font-family: 'Nunito', sans-serif;
  box-shadow: 0 4px 18px rgba(168,85,247,0.3);
  transition: opacity 0.15s, transform 0.1s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  margin-top: 0.75rem;
}
.btn-submit:hover { opacity: 0.9; transform: scale(1.02); }
.btn-submit:active { transform: scale(0.97); }
.btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

.decline-msg {
  text-align: center; padding: 1.5rem;
  border-radius: 20px;
  background: #fff;
  color: #e07aaa; font-size: 15px; font-weight: 600;
  margin-bottom: 1.5rem;
  border: 2px dashed #f9b8d4;
}

.success-icon {
  width: 72px; height: 72px;
  background: #fce7f3; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 34px; margin: 0 auto 1rem;
  border: 3px solid #f9a8d4;
  animation: pop 0.4s cubic-bezier(.68,-0.55,.27,1.55);
}
@keyframes pop { 0%{transform:scale(0)} 100%{transform:scale(1)} }

.summary-box {
  background: #fff; border-radius: 20px;
  padding: 1rem 1.25rem; margin: 1rem 0;
  border: 2px solid #f9b8d4;
}
.summary-row {
  display: flex; justify-content: space-between;
  align-items: center; padding: 8px 0; font-size: 14px;
  border-bottom: 1px dashed #fdd4e8; gap: 12px;
}
.summary-row:last-child { border-bottom: none; }
.summary-key { color: #e07aaa; font-weight: 700; flex-shrink: 0; }
.summary-val { color: #c2185b; font-weight: 700; word-break: break-word; }

.btn-restart {
  width: 100%; padding: 0.65rem;
  background: #fff; border: 2px solid #f9b8d4;
  border-radius: 50px; color: #e07aaa; font-size: 14px;
  cursor: pointer; font-family: 'Nunito', sans-serif; font-weight: 700;
  transition: background 0.15s; margin-top: 0.75rem;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.btn-restart:hover { background: #fff0f6; }

.floating-heart {
  position: absolute; font-size: 22px; opacity: 0;
  animation: floatUp 3s ease-in-out infinite;
  pointer-events: none;
}
@keyframes floatUp {
  0%   { opacity: 0; transform: translateY(0) scale(0.7) rotate(-10deg); }
  20%  { opacity: 0.9; }
  80%  { opacity: 0.5; }
  100% { opacity: 0; transform: translateY(-90px) scale(1.1) rotate(10deg); }
}

.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #f472b6; color: #fff;
  padding: 0.65rem 1.5rem; border-radius: 50px;
  font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 14px;
  box-shadow: 0 4px 18px rgba(244,114,182,0.4);
  z-index: 9999; opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }
</style>
</head>
<body style="background:#fff0f6;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem;">

<h2 class="sr-only">Date idea - wanna watch a movie with me?</h2>

<div class="hk-wrap" style="width:100%;max-width:480px;">

  <svg class="hearts-bg" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
    <text x="30"  y="50"  font-size="22" opacity="0.18" fill="#f472b6">♥</text>
    <text x="620" y="80"  font-size="16" opacity="0.15" fill="#a855f7">♥</text>
    <text x="80"  y="480" font-size="14" opacity="0.15" fill="#fb7185">♥</text>
    <text x="580" y="460" font-size="20" opacity="0.18" fill="#f472b6">♥</text>
    <text x="340" y="30"  font-size="12" opacity="0.13" fill="#e879f9">♥</text>
    <text x="15"  y="260" font-size="18" opacity="0.12" fill="#a855f7">♥</text>
    <text x="650" y="300" font-size="14" opacity="0.13" fill="#f472b6">♥</text>
    <text x="200" y="500" font-size="10" opacity="0.12" fill="#fb7185">♥</text>
    <text x="480" y="510" font-size="12" opacity="0.13" fill="#e879f9">♥</text>
    <text x="120" y="130" font-size="10" opacity="0.10" fill="#f472b6">✿</text>
    <text x="550" y="150" font-size="10" opacity="0.10" fill="#a855f7">✿</text>
    <text x="60"  y="380" font-size="10" opacity="0.10" fill="#e879f9">✿</text>
    <text x="610" y="410" font-size="10" opacity="0.10" fill="#f472b6">✿</text>
  </svg>

  <div class="content">

    <div class="title-row">
      <div class="title-text">Date Idea ♡</div>
      <div class="title-sub">a little something special for you</div>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progress"></div>
    </div>

    <div id="step1" class="step active">
      <p class="step-label">✦ step 1 of 2</p>
      <p class="question">Wanna watch a movie with me? ♡</p>
      <div class="btn-row">
        <button class="btn btn-yes" onclick="goYes()">
          ♥ Yes please!
        </button>
        <button class="btn btn-no" onclick="goNo()">
          ✕ No...
        </button>
      </div>
    </div>

    <div id="step2" class="step">
      <p class="step-label">✦ step 2 of 2</p>
      <p class="question">Yay! Let's plan it ♡</p>
      <div class="input-group">
        <label class="input-label" for="inp-movie">♡ Movie name</label>
        <input class="text-input" id="inp-movie" type="text" placeholder="e.g. The Notebook..." />
      </div>
      <div class="input-group">
        <label class="input-label" for="inp-when">✦ When</label>
        <input class="text-input" id="inp-when" type="text" placeholder="e.g. Tonight at 8pm..." />
      </div>
      <button class="btn-submit" id="submitBtn" onclick="submitForm()">
        ♡ Send the plan!
      </button>
    </div>

    <div id="step-no" class="step">
      <div class="decline-msg">
        ♡ Aww no worries... maybe next time~
      </div>
      <button class="btn-restart" onclick="restart()">
        ↻ Ask again
      </button>
    </div>

    <div id="step-done" class="step">
      <div class="success-icon">♡</div>
      <p class="question" style="font-size:20px;">It's a date!</p>
      <p style="text-align:center;color:#e07aaa;font-size:14px;font-weight:600;margin-bottom:0.5rem;">Here's what you planned~</p>
      <div class="summary-box" id="summary"></div>
      <button class="btn-restart" onclick="restart()">
        ↻ Start over
      </button>
    </div>

  </div>

  <span class="floating-heart" style="left:8%;bottom:10%;animation-delay:0s;font-size:18px;color:#f472b6;">♥</span>
  <span class="floating-heart" style="left:85%;bottom:15%;animation-delay:1.2s;font-size:14px;color:#a855f7;">♥</span>
  <span class="floating-heart" style="left:50%;bottom:5%;animation-delay:2.1s;font-size:12px;color:#fb7185;">♥</span>
  <span class="floating-heart" style="left:25%;bottom:8%;animation-delay:0.7s;font-size:16px;color:#e879f9;">♥</span>
  <span class="floating-heart" style="left:70%;bottom:12%;animation-delay:1.8s;font-size:10px;color:#f472b6;">♥</span>

</div>

<div class="toast" id="toast"></div>

<script>
  // ======= إعدادات تلغرام =======
  var TELEGRAM_TOKEN = '8858225138:AAHmuVJO1Fea-Q_y4zHVMhGn1axBIRMhOyo';
  var TELEGRAM_CHAT_ID = '5408056761';
  // ================================

  function showToast(msg, color) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = color || '#f472b6';
    t.classList.add('show');
    setTimeout(function(){ t.classList.remove('show'); }, 3000);
  }

  async function sendToTelegram(message) {
    var url = 'https://api.telegram.org/bot' + TELEGRAM_TOKEN + '/sendMessage';
    try {
      var res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          chat_id: TELEGRAM_CHAT_ID,
          text: message,
          parse_mode: 'HTML'
        })
      });
      var data = await res.json();
      if (data.ok) {
        showToast('✓ تم الإرسال!', '#10b981');
      } else {
        showToast('⚠ خطأ في الإرسال', '#ef4444');
        console.error('Telegram error:', data);
      }
    } catch (err) {
      showToast('⚠ تعذّر الاتصال', '#ef4444');
      console.error('Fetch error:', err);
    }
  }

  function show(id, pct) {
    document.querySelectorAll('.step').forEach(function(s){ s.classList.remove('active'); });
    document.getElementById(id).classList.add('active');
    document.getElementById('progress').style.width = pct + '%';
  }

  function goYes() {
    show('step2', 50);
    sendToTelegram('💕 <b>إجابة جديدة!</b>\n\nالسؤال: هل تريد مشاهدة فيلم معي؟\nالإجابة: ✅ نعم بالتأكيد!');
  }

  function goNo() {
    show('step-no', 100);
    sendToTelegram('💔 <b>إجابة جديدة!</b>\n\nالسؤال: هل تريد مشاهدة فيلم معي؟\nالإجابة: ❌ لا...');
  }

  async function submitForm() {
    var movie = document.getElementById('inp-movie').value.trim();
    var when  = document.getElementById('inp-when').value.trim();
    var valid = true;
    ['inp-movie','inp-when'].forEach(function(id){
      var el = document.getElementById(id);
      if (!el.value.trim()) { el.classList.add('error'); valid = false; }
      else el.classList.remove('error');
    });
    if (!valid) return;

    var btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '♡ جاري الإرسال...';

    var rows = [
      { k: '♡ Movie', v: movie },
      { k: '✦ When',  v: when  }
    ];
    document.getElementById('summary').innerHTML = rows.map(function(r){
      return '<div class="summary-row"><span class="summary-key">'+r.k+'</span><span class="summary-val">'+r.v+'</span></div>';
    }).join('');

    var message = '🎬 <b>تم تأكيد الموعد!</b>\n\n'
      + '♡ الفيلم: <b>' + movie + '</b>\n'
      + '✦ الوقت: <b>' + when + '</b>\n\n'
      + '💕 It\'s a date!';

    await sendToTelegram(message);

    btn.disabled = false;
    btn.innerHTML = '♡ Send the plan!';
    show('step-done', 100);
  }

  function restart() {
    document.getElementById('inp-movie').value = '';
    document.getElementById('inp-when').value  = '';
    document.querySelectorAll('.text-input').forEach(function(i){ i.classList.remove('error'); });
    show('step1', 0);
  }
</script>

</body>
</html>
